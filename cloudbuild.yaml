# Build the v15.1 single-model image (~18 GB weights, one Qwen3-32B-AWQ INT4
# weight embedded) on Google Cloud Build, then push to the competition registry.
# v15.1 = the v15 container base with the EXACT exp37 model+prompt (Qwen3-32B-AWQ,
# context-first E5 prompt, exp08 single-ref shot pair). exp37 = 0.6944 leak-free.
# GitHub Actions can't do even this (runner disk ~14 GB); LANTA podman is blocked
# (no /etc/subuid). GCB gives a configurable disk.
#
# PERSISTENT MODEL CACHE VIA GCS (same scheme as v16.4/v22): the model weight is
# NOT downloaded inside `docker build`. A GCS tar ($_HF_BUCKET/v15.1/hf-cache.tar)
# holds a HuggingFace cache; each build (1) restores it into the workspace,
# (2) snapshot_download's the model only if missing, (3) re-uploads if changed,
# then (4) bakes it into the image via `COPY hf-cache`. The heavy, flaky HF pull
# happens at most ONCE, ever — warm rebuilds (e.g. a run.py edit) skip it.
# This image uses its OWN tar (v15.1/ prefix), SEPARATE from v16.x and v22's
# tars — Qwen3-32B-AWQ is the only weight, so a separate prefix keeps the image
# at ~18 GB instead of inheriting v22's two-model ~40 GB cache.
#
# Region: asia-southeast1 is the persistent default (gcloud config builds/region
# + the regional default staging bucket) — submit with a bare
# `gcloud builds submit --config cloudbuild.yaml .`, no --region needed.
# One-time bucket setup was already done for v22 (bucket
# textsum-hf-cache-437476422274, Cloud Build SA has roles/storage.objectAdmin).

substitutions:
  _HF_BUCKET: 'gs://textsum-hf-cache-437476422274/hf'   # GCS path holding the HF cache (asia-southeast1)

steps:
  # 1. Restore the v15.1 HF cache from a single tar in GCS. Stored as a TAR
  #    (not an rsync'd tree) because the HF layout is blobs/ + snapshots/
  #    symlinks; GCS can't hold symlinks, so rsync would store every file twice.
  #    tar keeps the symlinks intact. First build: no tar yet → start empty.
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - -c
      - |
        set -euo pipefail
        mkdir -p textsum/hf-cache
        if gsutil -q stat "${_HF_BUCKET}/v15.1/hf-cache.tar"; then
          gsutil -m cp "${_HF_BUCKET}/v15.1/hf-cache.tar" /workspace/hf-cache.tar
          tar -xf /workspace/hf-cache.tar -C textsum
          echo "restored v15.1 HF cache from tar"
        else
          echo "no v15.1 cache tar yet (first build) — will download the model"
        fi

  # 2. Download the model only if not already present (restored by step 1).
  #    Keep this in sync with run.py's LLM_MODEL default. snapshot_download
  #    skips a repo already complete in the cache.
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - -c
      - |
        set -euo pipefail
        pip install --no-cache-dir --timeout 300 --retries 5 huggingface_hub hf_transfer
        export HF_HOME=/workspace/textsum/hf-cache HF_HUB_ENABLE_HF_TRANSFER=1
        python -c "from huggingface_hub import snapshot_download; \
          snapshot_download('Qwen/Qwen3-32B-AWQ')"

  # 3. Repack the cache as a single tar (symlinks preserved, no -h → ~18 GB not
  #    ~36) and upload, replacing the previous tar.
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - -c
      - |
        set -euo pipefail
        tar -cf /workspace/hf-cache.tar -C textsum hf-cache
        gsutil -m cp /workspace/hf-cache.tar "${_HF_BUCKET}/v15.1/hf-cache.tar"
        echo "uploaded v15.1 cache tar: $(du -h /workspace/hf-cache.tar | cut -f1)"

  # 4. Build the image (weights come from the context via COPY hf-cache) + push.
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'textsum'              # build context = ./textsum (now incl. hf-cache/)
    entrypoint: 'bash'
    secretEnv: ['REGISTRY_PASSWORD']
    args:
      - -c
      - |
        set -euo pipefail
        IMG=registry.ai.in.th/2026-textsum/47b13a1c/nontapat.jf0n
        echo "$$REGISTRY_PASSWORD" | docker login registry.ai.in.th \
          -u nontapat.jf0n --password-stdin
        # Inline cache from the previous image reuses the apt/pip/torch base
        # layers; the COPY hf-cache layer is cache-hit when the weight is
        # unchanged, so a run.py edit busts only the tiny final COPY model layer.
        # --cache-from on a missing tag (first v15.1 build) is a no-op warning.
        DOCKER_BUILDKIT=1 docker build \
          --cache-from $$IMG:v15.1 \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t $$IMG:v15.1 .
        docker push $$IMG:v15.1

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/registry-password/versions/latest
      env: 'REGISTRY_PASSWORD'

options:
  # workspace hf-cache (~18 GB extracted) + the repacked hf-cache.tar (~18 GB) +
  # docker layers (base+torch+vllm ~30 GB) + the COPY hf-cache image layer
  # (~18 GB) + transient COPY scratch peak. 250 GB (matches v16.4/v22) leaves
  # ample headroom for this smaller single-model image.
  diskSizeGb: 250
  # HIGHCPU_8 = faster pip install + better network for the GCS sync. Bumping
  # machineType/disk above defaults exits the free 120 min/day tier (billed from
  # minute 1) — covered by the $300 trial credit.
  machineType: 'E2_HIGHCPU_8'

# First build (cold cache) ~1 h (HF download). Warm builds skip the download —
# only the GCS restore + docker layer assembly, ~10-20 min. 4 h ceiling.
timeout: 14400s
