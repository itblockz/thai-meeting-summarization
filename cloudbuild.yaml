# Build the v17.4 two-stage image (~36 GB of weights embedded: nvidia/Gemma-4-
# 26B-A4B-NVFP4 Stage 1 refs + Qwen/Qwen3-32B-AWQ Stage 2 answer) on Google
# Cloud Build, then push to the competition registry. This is the COUPLED ref-
# hint pipe (32B-AWQ hinted answer + gemma-NVFP4 refs = exp86's ansB_refA, NEW
# BEST 0.7235); v17.4 = v17.3 + Stage 1's ref indices hinting Stage 2 (v17.3 ran
# the two models independently and column-merged). Built on the v16.3 lean
# NO-nvcc base. GitHub Actions can't do this (runner disk ~14 GB); LANTA podman
# is blocked (no /etc/subuid). GCB gives a configurable disk.
#
# PERSISTENT MODEL CACHE VIA GCS (same scheme as v16.3/v22): the weights are NOT
# downloaded inside `docker build`. A GCS tar ($_HF_BUCKET/v17.3/hf-cache.tar)
# holds a HuggingFace cache; each build (1) restores it into the workspace,
# (2) snapshot_download's only the models still missing, (3) re-uploads if
# changed, then (4) bakes it into the image via `COPY hf-cache`. The heavy,
# flaky HF pull happens at most ONCE, ever — warm rebuilds (e.g. a run.py edit)
# skip it. v17.4's model SET is byte-identical to v17.3 (same gemma + 32B-AWQ),
# so it REUSES the v17.3/ cache tar — no fresh 47 GB download/upload; only the
# pushed image tag changes to :v17.4.
#
# Region: asia-southeast1 is the persistent default (gcloud config
# builds/region + the regional default staging bucket) — submit with a bare
# `gcloud builds submit --config cloudbuild.yaml .`, no --region needed.
# One-time bucket setup was already done for v22 (bucket
# textsum-hf-cache-437476422274, Cloud Build SA has roles/storage.objectAdmin).

substitutions:
  _HF_BUCKET: 'gs://textsum-hf-cache-437476422274/hf'   # GCS path holding the HF cache (asia-southeast1)

steps:
  # 1. Restore the v17.3 HF cache from a single tar in GCS. Stored as a TAR
  #    (not an rsync'd tree) because the HF layout is blobs/ + snapshots/
  #    symlinks; GCS can't hold symlinks, so rsync would store every file twice.
  #    tar keeps the symlinks intact. First build: no tar yet → start empty.
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - -c
      - |
        set -euo pipefail
        mkdir -p textsum/hf-cache
        if gsutil -q stat "${_HF_BUCKET}/v17.3/hf-cache.tar"; then
          gsutil -m cp "${_HF_BUCKET}/v17.3/hf-cache.tar" /workspace/hf-cache.tar
          tar -xf /workspace/hf-cache.tar -C textsum
          echo "restored v17.3 HF cache from tar"
        else
          echo "no v17.3 cache tar yet (first build) — will download both models"
        fi

  # 2. Download both models only if not already present (restored by step 1).
  #    Keep these in sync with run.py's LLM_MODEL_STAGE_1/_2 defaults.
  #    snapshot_download skips repos already complete in the cache.
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - -c
      - |
        set -euo pipefail
        pip install --no-cache-dir --timeout 300 --retries 5 huggingface_hub hf_transfer
        export HF_HOME=/workspace/textsum/hf-cache HF_HUB_ENABLE_HF_TRANSFER=1
        python -c "from huggingface_hub import snapshot_download; \
          snapshot_download('nvidia/Gemma-4-26B-A4B-NVFP4'); \
          snapshot_download('Qwen/Qwen3-32B-AWQ')"

  # 3. Repack the cache as a single tar (symlinks preserved, no -h → ~47 GB not
  #    ~94) and upload, replacing the previous tar.
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - -c
      - |
        set -euo pipefail
        tar -cf /workspace/hf-cache.tar -C textsum hf-cache
        gsutil -m cp /workspace/hf-cache.tar "${_HF_BUCKET}/v17.3/hf-cache.tar"
        echo "uploaded v17.3 cache tar: $(du -h /workspace/hf-cache.tar | cut -f1)"

  # 4. Build the image (weights come from the context via COPY hf-cache) + push.
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'textsum'              # build context = ./textsum (now incl. hf-cache/)
    entrypoint: 'bash'
    secretEnv: ['REGISTRY_PASSWORD']
    args:
      - -c
      - |
        set -euo pipefail
        IMG=registry.ai.in.th/2026-textsum/47b13a1c/nontapat.jf0n
        echo "$$REGISTRY_PASSWORD" | docker login registry.ai.in.th \
          -u nontapat.jf0n --password-stdin
        # Inline cache from the previous image reuses the apt/pip/torch base
        # layers; the COPY hf-cache layer is cache-hit when the weights are
        # unchanged, so a run.py edit busts only the tiny final COPY model layer.
        # cache-from v17.3 too: base/torch/vllm + the COPY hf-cache layer are
        # identical (same weight set), so v17.4 reuses them and only the final
        # COPY model layer (the edited run.py) rebuilds.
        DOCKER_BUILDKIT=1 docker build \
          --cache-from $$IMG:v17.4 \
          --cache-from $$IMG:v17.3 \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t $$IMG:v17.4 .
        docker push $$IMG:v17.4

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/registry-password/versions/latest
      env: 'REGISTRY_PASSWORD'

options:
  # All on one disk: workspace hf-cache (~47 GB extracted) + the repacked
  # hf-cache.tar (~47 GB) + docker layers (base+torch+vllm ~30 GB) + the
  # COPY hf-cache image layer (~47 GB) + transient COPY scratch (~47 GB) peak.
  # v16.3 (single ~26 GB model) fit in 250; with both models (~47 GB cache)
  # 350 GB leaves headroom.
  diskSizeGb: 350
  # HIGHCPU_8 = faster pip install + better network for the GCS sync. Bumping
  # machineType/disk above defaults exits the free 120 min/day tier (billed from
  # minute 1) — covered by the $300 trial credit.
  machineType: 'E2_HIGHCPU_8'

# First build (cold cache) ~1-1.5 h (two HF downloads). Warm builds skip the
# download — only the GCS restore + docker layer assembly, ~15-30 min.
timeout: 14400s
