# Build the v15.2 single-model image (~18 GB weights, one Qwen3-32B-AWQ INT4
# weight embedded) on Google Cloud Build, then push to the competition registry.
# v15.2 = the v15 container base with the EXACT exp38 model+prompt (Qwen3-32B-AWQ,
# context-first E5 prompt, exp08 shot1 + the multi-ref shot2 Q0746). exp38 =
# 0.6987 leak-free. It differs from v15.1 (= exp37, 0.6944) ONLY in shot2, so
# v15.2-vs-v15.1 isolates the exp37→exp38 delta inside the container. GitHub
# Actions can't do even this (runner disk ~14 GB); LANTA podman is blocked
# (no /etc/subuid). GCB gives a configurable disk.
#
# PERSISTENT MODEL CACHE VIA GCS (same scheme as v15.1/v16.4/v22): the model
# weight is NOT downloaded inside `docker build`. A GCS tar holds a HuggingFace
# cache; each build (1) restores it, (2) snapshot_download's the model only if
# missing, (3) re-uploads if changed, then (4) bakes it via `COPY hf-cache`.
# v15.2 SHARES v15.1's tar (${_HF_BUCKET}/v15.1/hf-cache.tar): the weight is
# byte-identical (Qwen3-32B-AWQ), so the v15.1 tar is already populated → step 2
# is a pure cache hit, NO download. We also `--cache-from $IMG:v15.1`, so every
# Docker layer (apt/pip/torch/vllm + the ~18 GB COPY hf-cache) is reused; only
# the tiny final `COPY model` layer (the run.py shot2 change) is rebuilt. Net:
# a near-instant layer swap, no HF pull, no duplicate 18 GB GCS object.
#
# Region: asia-southeast1 is the persistent default (gcloud config builds/region
# + the regional default staging bucket) — submit with a bare
# `gcloud builds submit --config cloudbuild.yaml .`, no --region needed.
# One-time bucket setup was already done for v22 (bucket
# textsum-hf-cache-437476422274, Cloud Build SA has roles/storage.objectAdmin).

substitutions:
  _HF_BUCKET: 'gs://textsum-hf-cache-437476422274/hf'   # GCS path holding the HF cache (asia-southeast1)
  _HF_PREFIX: 'v15.1'                                    # SHARED model tar (same Qwen3-32B-AWQ weight as v15.1)

steps:
  # 1. Restore the shared (v15.1) HF cache from a single tar in GCS. Stored as a
  #    TAR (not an rsync'd tree) because the HF layout is blobs/ + snapshots/
  #    symlinks; GCS can't hold symlinks, so rsync would store every file twice.
  #    tar keeps the symlinks intact. The v15.1 build already populated this tar,
  #    so this is a hit; the else-branch only fires if v15.1 was never built.
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - -c
      - |
        set -euo pipefail
        mkdir -p textsum/hf-cache
        if gsutil -q stat "${_HF_BUCKET}/${_HF_PREFIX}/hf-cache.tar"; then
          gsutil -m cp "${_HF_BUCKET}/${_HF_PREFIX}/hf-cache.tar" /workspace/hf-cache.tar
          tar -xf /workspace/hf-cache.tar -C textsum
          echo "restored ${_HF_PREFIX} HF cache from tar"
        else
          echo "no ${_HF_PREFIX} cache tar yet — will download the model"
        fi

  # 2. Download the model only if not already present (restored by step 1).
  #    Keep this in sync with run.py's LLM_MODEL default. snapshot_download
  #    skips a repo already complete in the cache → no-op for the shared tar.
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - -c
      - |
        set -euo pipefail
        pip install --no-cache-dir --timeout 300 --retries 5 huggingface_hub hf_transfer
        # huggingface_hub >=1.x defaults to the Xet download backend and IGNORES
        # HF_HUB_ENABLE_HF_TRANSFER (it prints a deprecation warning, then routes
        # downloads through Xet CAS). On Cloud Build (asia-southeast1) the Xet CAS
        # endpoint stalls — the first build hung at "Fetching 14 files 0%" for
        # 45+ min with not one shard finished (build 5c0671ce, cancelled). Force
        # the classic, proven path: HF_HUB_DISABLE_XET=1 falls back to the Rust
        # hf_transfer downloader (installed above), which is fast and prints
        # real per-shard byte progress.
        export HF_HOME=/workspace/textsum/hf-cache \
               HF_HUB_ENABLE_HF_TRANSFER=1 \
               HF_HUB_DISABLE_XET=1
        python -c "from huggingface_hub import snapshot_download; \
          snapshot_download('Qwen/Qwen3-32B-AWQ')"

  # 3. Repack the cache as a single tar (symlinks preserved, no -h → ~18 GB not
  #    ~36) and re-upload to the SHARED v15.1 tar. Idempotent: the content is the
  #    same Qwen3-32B-AWQ weight v15.1 already stored, so this just refreshes it.
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - -c
      - |
        set -euo pipefail
        tar -cf /workspace/hf-cache.tar -C textsum hf-cache
        gsutil -m cp /workspace/hf-cache.tar "${_HF_BUCKET}/${_HF_PREFIX}/hf-cache.tar"
        echo "uploaded ${_HF_PREFIX} cache tar: $(du -h /workspace/hf-cache.tar | cut -f1)"

  # 4. Build the image (weights come from the context via COPY hf-cache) + push.
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'textsum'              # build context = ./textsum (now incl. hf-cache/)
    entrypoint: 'bash'
    secretEnv: ['REGISTRY_PASSWORD']
    args:
      - -c
      - |
        set -euo pipefail
        IMG=registry.ai.in.th/2026-textsum/47b13a1c/nontapat.jf0n
        echo "$$REGISTRY_PASSWORD" | docker login registry.ai.in.th \
          -u nontapat.jf0n --password-stdin
        # Cache from the v15.1 image: identical apt/pip/torch/vllm layers AND the
        # ~18 GB COPY hf-cache layer (same weight) are cache-hit; only the final
        # COPY model layer (the run.py shot2 change → exp38) is rebuilt. This is
        # the whole point of building v15.2 off v15.1 — a near-instant layer swap.
        DOCKER_BUILDKIT=1 docker build \
          --cache-from $$IMG:v15.1 \
          --cache-from $$IMG:v15.2 \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t $$IMG:v15.2 .
        docker push $$IMG:v15.2

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/registry-password/versions/latest
      env: 'REGISTRY_PASSWORD'

options:
  # workspace hf-cache (~18 GB extracted) + the repacked hf-cache.tar (~18 GB) +
  # docker layers (base+torch+vllm ~30 GB) + the COPY hf-cache image layer
  # (~18 GB) + transient COPY scratch peak. 250 GB (matches v15.1/v16.4/v22)
  # leaves ample headroom for this smaller single-model image.
  diskSizeGb: 250
  # HIGHCPU_8 = faster pip install + better network for the GCS sync. Bumping
  # machineType/disk above defaults exits the free 120 min/day tier (billed from
  # minute 1) — covered by the $300 trial credit.
  machineType: 'E2_HIGHCPU_8'

# Warm build (shares v15.1's cache + Docker layers): no HF download, only the
# GCS restore + final COPY model layer + push, ~10-15 min. 4 h ceiling.
timeout: 14400s
