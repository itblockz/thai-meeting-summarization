# Build the v22 two-stage hybrid image (~42 GB, both gemma-4-31B-it-NVFP4 +
# Qwen3-32B-AWQ weights embedded) on Google Cloud Build, then push to the
# competition registry. GitHub Actions can't do this (runner disk ~14 GB);
# LANTA podman is blocked (no /etc/subuid). GCB gives a configurable disk.
#
# PERSISTENT MODEL CACHE VIA GCS: the model weights are NOT downloaded inside
# `docker build`. Instead a GCS bucket ($_HF_BUCKET) holds a HuggingFace cache
# that accumulates EVERY model we have ever pulled. Each build (1) syncs the
# bucket down into the workspace, (2) snapshot_download's only the models that
# are still missing, (3) syncs anything new back up, then (4) bakes the cache
# into the image via `COPY hf-cache`. Switching the Stage-A model away and
# later back is a full cache hit — the old model never left the bucket. The
# heavy, flaky HF pull happens at most ONCE per model, ever.
#
# One-time setup (run manually before the first build):
#   gsutil mb -l <region> gs://<bucket>            # create the bucket
#   # grant the Cloud Build service account read/write on it:
#   gsutil iam ch serviceAccount:<PROJECT_NUMBER>@cloudbuild.gserviceaccount.com:roles/storage.objectAdmin gs://<bucket>
# Then set _HF_BUCKET below (or pass --substitutions=_HF_BUCKET=gs://<bucket>/hf).
#
# Run:  gcloud builds submit --config cloudbuild.yaml .
# (run from repo root D:\textsum — the docker build context is textsum/)

substitutions:
  _HF_BUCKET: 'gs://textsum-hf-cache-437476422274/hf'   # GCS path holding the HF cache (asia-southeast1)

steps:
  # 1. Restore the HF cache from a single tar in GCS. The cache is stored as a
  #    TAR (not an rsync'd tree) because the HF layout is blobs/ + snapshots/
  #    symlinks; GCS can't hold symlinks, so `gsutil rsync` dereferences them and
  #    stores every file TWICE (blobs + resolved snapshots ≈ 2× size). tar keeps
  #    the symlinks intact → one ~40 GB object, no duplication, and a single
  #    large transfer is faster than thousands of small blob files. First build:
  #    no tar yet → start empty.
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - -c
      - |
        set -euo pipefail
        mkdir -p textsum/hf-cache
        if gsutil -q stat "${_HF_BUCKET}/hf-cache.tar"; then
          gsutil -m cp "${_HF_BUCKET}/hf-cache.tar" /workspace/hf-cache.tar
          tar -xf /workspace/hf-cache.tar -C textsum
          echo "restored HF cache from tar"
        else
          echo "no cache tar yet (first build) — will download all models"
        fi

  # 2. Download ONLY the models not already present (restored by step 1). The
  #    model list lives here; keep it in sync with run.py's LLM_MODEL_STAGE_*
  #    defaults. snapshot_download skips repos already complete in the cache.
  - name: 'python:3.11-slim'
    entrypoint: 'bash'
    args:
      - -c
      - |
        set -euo pipefail
        pip install --no-cache-dir --timeout 300 --retries 5 huggingface_hub hf_transfer
        export HF_HOME=/workspace/textsum/hf-cache HF_HUB_ENABLE_HF_TRANSFER=1
        python -c "from huggingface_hub import snapshot_download; \
          snapshot_download('RedHatAI/gemma-4-31B-it-NVFP4'); \
          snapshot_download('Qwen/Qwen3-32B-AWQ')"

  # 3. Repack the cache as a single tar (symlinks preserved → no blob/snapshot
  #    duplication) and upload, replacing the previous tar. tar defaults to
  #    storing symlinks AS symlinks (no -h), so the archive is ~40 GB not ~80.
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args:
      - -c
      - |
        set -euo pipefail
        tar -cf /workspace/hf-cache.tar -C textsum hf-cache
        gsutil -m cp /workspace/hf-cache.tar "${_HF_BUCKET}/hf-cache.tar"
        echo "uploaded cache tar: $(du -h /workspace/hf-cache.tar | cut -f1)"

  # 4. Build the image (weights come from the context via COPY) + push.
  - name: 'gcr.io/cloud-builders/docker'
    dir: 'textsum'              # build context = ./textsum (now incl. hf-cache/)
    entrypoint: 'bash'
    secretEnv: ['REGISTRY_PASSWORD']
    args:
      - -c
      - |
        set -euo pipefail
        IMG=registry.ai.in.th/2026-textsum/47b13a1c/nontapat.jf0n
        echo "$$REGISTRY_PASSWORD" | docker login registry.ai.in.th \
          -u nontapat.jf0n --password-stdin
        # Inline cache from the previous image reuses the apt/pip/torch base
        # layers (the COPY hf-cache layer is cache-hit when the weights are
        # unchanged; the COPY model layer is the only thing a run.py edit busts).
        DOCKER_BUILDKIT=1 docker build \
          --cache-from $$IMG:v22 \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -t $$IMG:v22 .
        docker push $$IMG:v22

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/registry-password/versions/latest
      env: 'REGISTRY_PASSWORD'

options:
  # workspace HF cache (~40 GB) + docker context + image layers + the ~42 GB
  # image need well over the default 100 GB. 250 GB leaves headroom.
  diskSizeGb: 250
  # HIGHCPU_8 = faster pip install + better network for the GCS sync. Bumping
  # machineType/disk above defaults exits the free 120 min/day tier (billed from
  # minute 1) — covered by the $300 trial credit.
  machineType: 'E2_HIGHCPU_8'

# First build (cold GCS bucket) ~1-2 h (HF download). Warm builds skip the
# download — only the GCS sync + docker layer assembly, ~10-20 min. 4 h ceiling.
timeout: 14400s
